<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Analyzer App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="start-section">
        <h1 class="heading">Personality Analyzer</h1>
        <p>Answer a few questions to discover your personality type.</p>
        <button class="start-btn">Start</button>
    </div>

    <div class="question-section">
        <p class="question-number">Question 1 / 10</p>
        <h2 class="question-text">Q.1 what is your name ji ?</h2>
        <div class="options"></div>
        <button class="next-btn">Next</button>
    </div>

    <div class="result-section">
        <h2 class="result-title">Your Personality</h2>
        <p class="result-description"> here is your result discription...</p>
        <button class="restart-btn">Restart</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
